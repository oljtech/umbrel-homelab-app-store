version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-homepage_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    restart: on-failure
    environment:
      PUID: 1000
      PGID: 1000
      # Homepage refuse les connexions dont le Host header n'est pas autorisé.
      # "*" désactive la vérification (OK sur un LAN derrière l'app_proxy Umbrel).
      # Pour verrouiller : remplace par "umbrel.local:8095,<IP-de-ton-umbrel>:8095"
      HOMEPAGE_ALLOWED_HOSTS: "*"
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/icons:/app/public/icons
      # Lecture seule : auto-découverte des autres conteneurs Umbrel
      - /var/run/docker.sock:/var/run/docker.sock:ro
