version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-picsou-finance_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/zoeille/picsou-finance:1.0.14@sha256:c7e18cdd9e55160a87dfed1ad9697de022145dcee113e9166e2b67c8fd8e4d09
    restart: on-failure
    environment:
      # ⚠️ Réseau Umbrel partagé entre toutes les apps : référencer les
      # services par NOM DE CONTENEUR (<app-id>_<service>_1), jamais par nom
      # de service ("db" collisionne avec le db des autres apps).
      SPRING_DATASOURCE_URL: jdbc:postgresql://homelab-picsou-finance_db_1:5432/picsou?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: picsou
      # L'entrypoint exporte lui-même SPRING_DATASOURCE_PASSWORD depuis
      # $POSTGRES_PASSWORD (ne pas passer SPRING_DATASOURCE_PASSWORD ici).
      POSTGRES_PASSWORD: ${APP_SEED}
      SPRING_PROFILES_ACTIVE: prod
      TR_AUTH_URL: http://homelab-picsou-finance_tr-auth_1:8001
    volumes:
      # /data : secrets auto-générés, clés Enable Banking, clé du wizard
      - ${APP_DATA_DIR}/data/app:/data
      # Déposer enablebanking.pem ici (via SSH) pour activer la synchro bancaire
      - ${APP_DATA_DIR}/data/secrets:/run/secrets:ro
    depends_on:
      - db
      - tr-auth

  # Sidecar d'authentification Trade Republic (port interne 8001)
  tr-auth:
    image: ghcr.io/zoeille/picsou-finance/tr-auth:1.0.14@sha256:2e8f4d44ae8a4546e0c5177fced560361a437f463f42938dded109d4084eef05
    restart: on-failure

  db:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: on-failure
    environment:
      POSTGRES_DB: picsou
      POSTGRES_USER: picsou
      POSTGRES_PASSWORD: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
